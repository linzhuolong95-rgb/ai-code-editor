version: '3'
services:
  frontend:
    image: frontend-image
    build:
      context: ./frontend
    ports:
      - "3000:3000"

  backend:
    image: backend-image
    build:
      context: ./backend
    ports:
      - "8000:8000"

  database:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis
    ports:
      - "6379:6379"